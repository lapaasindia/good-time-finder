# Event catalog — mirrors VedAstro EventDataList.xml
# Each entry maps to a MuhurthaRule via rule_key.
# nature: good | bad | neutral

# ──────────────────────────────────────────
# TRAVEL
# ──────────────────────────────────────────

- name: GoodLunarDayForTravel
  rule_key: good_lunar_day_for_travel
  nature: good
  description: >
    Best lunar days for travel are the 2nd, 3rd, 5th, 7th, 10th, 11th, and 13th.
  tags: [travel]

- name: BadLunarDayForTravel
  rule_key: bad_lunar_day_for_travel
  nature: bad
  description: >
    Lunar days 1, 8, 9, 14, and 15 are unfavourable for travel.
  tags: [travel]

- name: GoodConstellationForTravel
  rule_key: good_constellation_for_travel
  nature: good
  description: >
    Ashwini, Mrigashira, Punarvasu, Pushya, Hasta, Anuradha, Shravana,
    Dhanishta, and Revati are auspicious nakshatras for travel.
  tags: [travel]

- name: BadConstellationForTravel
  rule_key: bad_constellation_for_travel
  nature: bad
  description: >
    Bharani, Krittika, Ardra, Ashlesha, Magha, Jyeshtha, Mula, and
    Purva Ashadha are inauspicious for travel.
  tags: [travel]

- name: GoodLagnaForTravel
  rule_key: good_lagna_for_travel
  nature: good
  description: >
    Aries, Taurus, Cancer, Leo, Libra, and Sagittarius rising are
    auspicious lagnas for beginning a journey.
  tags: [travel]

- name: BestLagnaForTravel
  rule_key: best_lagna_for_travel
  nature: good
  description: >
    When the rising sign matches the person's natal Moon sign, it is
    the most personally auspicious lagna for travel.
  tags: [travel]

- name: GoodWeekdayForTravel
  rule_key: good_weekday_for_travel
  nature: good
  description: >
    Wednesday, Thursday, and Friday are auspicious weekdays for travel.
  tags: [travel]

- name: BadWeekdayForTravel
  rule_key: bad_weekday_for_travel
  nature: bad
  description: >
    Saturday and Tuesday are generally inauspicious for starting a journey.
  tags: [travel]

# ──────────────────────────────────────────
# GENERAL
# ──────────────────────────────────────────

- name: GoodMoonSignGeneral
  rule_key: good_moon_sign_general
  nature: good
  description: >
    Moon transiting Taurus, Cancer, Virgo, Libra, Sagittarius, or Pisces
    is generally auspicious for all activities.
  tags: [general]

- name: BadMoonSignGeneral
  rule_key: bad_moon_sign_general
  nature: bad
  description: >
    Moon transiting Aries, Scorpio, Capricorn, or Aquarius is generally
    unfavourable for new beginnings.
  tags: [general]

- name: JupiterInGoodHouse
  rule_key: jupiter_in_good_house
  nature: good
  description: >
    Jupiter placed in the 1st, 4th, 5th, 7th, 9th, 10th, or 11th house
    from the lagna is auspicious.
  tags: [general]

- name: SaturnInBadHouse
  rule_key: saturn_in_bad_house
  nature: bad
  description: >
    Saturn in the 1st, 4th, 7th, 8th, or 12th house from the lagna
    is unfavourable.
  tags: [general]

